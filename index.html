<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>灵越甘特图生成系统</title>
  <!-- Flatpickr -->
  <link rel="stylesheet" href="assets/css/flatpickr.min.css">
  <script src="assets/js/flatpickr.min.js"></script>
  <script src="assets/js/flatpickr_zh.js"></script>
  <!-- SheetJS -->
  <script src="assets/js/xlsx.full.min.js"></script>
  <!-- LZString -->
  <script src="assets/js/lz-string.min.js"></script>
  <!-- i18n -->
  <script src="assets/js/i18n.js"></script>
  <link rel="icon" type="image/svg+xml" href="assets/images/logo.svg">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/button.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="assets/images/logo.svg" alt="Logo" class="app-logo">
        <input class="title-input" id="doc-title" data-i18n-value="appTitle" value="灵越甘特图生成系统" />
      </div>
      <p class="hint" data-i18n="hint">拖动条形可移动工期，拉伸边缘可修改日期，工程项可拖动调整顺序，点击颜色块可以更换项目颜色。</p>
      <div class="actions">
        <div class="theme-switcher">
          <span class="theme-switcher-label" data-i18n="themeLabel">主题：</span>
          <button class="theme-btn active" data-theme="light" data-i18n-title="themeLight" title="浅色主题"></button>
          <button class="theme-btn" data-theme="dark" data-i18n-title="themeDark" title="黑色主题"></button>
          <button class="theme-btn" data-theme="gray" data-i18n-title="themeGray" title="灰色主题"></button>
          <button class="theme-btn" data-theme="blue" data-i18n-title="themeBlue" title="深蓝主题"></button>
          <span class="theme-switcher-label" data-i18n="langLabel" style="margin-left:8px;">语言：</span>
          <button class="theme-btn lang-btn active" id="lang-toggle-btn" title="Switch Language / 切换语言"
            onclick="setLang(getLang()==='zh'?'en':'zh')">
            <span class="btn-text-content" style="font-size:10px; font-weight:600; line-height:20px;">EN</span>
          </button>
        </div>
        <div class="actions-row" style="margin-bottom: 8px;">
          <div class="file-btn-wrapper group">
            <button class="btn btn-row-1" data-i18n="importExcel">
              <span class="corner-top"><span class="corner-cut"></span></span>
              <span class="corner-bottom"><span class="corner-cut"></span></span>
              <span class="btn-slide"></span>
              <span class="btn-text-content">导入 Excel</span>
            </button>
            <input type="file" id="import-excel" accept=".xlsx,.xls" />
          </div>
          <button class="btn btn-row-1 group" id="export-dialog-btn" data-i18n="exportBtn"
            data-i18n-title="exportBtnTitle" title="将数据导出为其它格式">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">导出...</span>
          </button>
        </div>
        <div class="actions-row" style="margin-bottom: 8px;">
          <div class="file-btn-wrapper group">
            <button class="btn btn-row-2" data-i18n="openProject" data-i18n-title="openProjectTitle"
              title="打开现有工程文件 (.gantt)">
              <span class="corner-top"><span class="corner-cut"></span></span>
              <span class="corner-bottom"><span class="corner-cut"></span></span>
              <span class="btn-slide"></span>
              <span class="btn-text-content">打开工程</span>
            </button>
            <input type="file" id="import-project" accept=".gantt" />
          </div>
          <button class="btn btn-row-2 group" id="save-project" data-i18n="saveProject"
            data-i18n-title="saveProjectTitle" title="保存当前工程为 .gantt 文件">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">保存工程</span>
          </button>
        </div>
        <div class="actions-row" style="margin-bottom: 8px;">
          <button class="btn btn-row-3 group" id="undo-btn" title="撤销 (Ctrl+Z)" disabled>
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">撤销</span>
          </button>
          <button class="btn btn-row-3 group" id="redo-btn" title="重做 (Ctrl+Y)" disabled>
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">重做</span>
          </button>
        </div>
        <div class="actions-row">
          <button class="btn btn-row-4 group" id="display-mode-btn" data-i18n="showDuration">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">显示时长</span>
          </button>
          <button class="btn btn-row-4 group" id="preview-mode-btn" data-i18n="previewMode">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">预览模式</span>
          </button>
          <button class="btn btn-row-4 group" id="label-position-btn" data-i18n="labelInside">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">名称外显</span>
          </button>
          <button class="btn btn-collapse group" id="collapse-mode-btn" data-i18n="collapseShow">
            <span class="corner-top"><span class="corner-cut"></span></span>
            <span class="corner-bottom"><span class="corner-cut"></span></span>
            <span class="btn-slide"></span>
            <span class="btn-text-content">折叠显示</span>
          </button>
        </div>
      </div>
      <div id="task-list-header" style="padding: 0 4px;">
        <button class="add-task-btn btn btn-row-2 group" onclick="addTask()" data-i18n="addTask">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <div class="btn-text-content" style="display:flex; align-items:center; justify-content:center;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            增加工程项
          </div>
        </button>
      </div>
      <div id="task-list"></div>
      <div class="sidebar-resizer" id="sidebar-resizer"></div>
    </aside>
    <main class="main">
      <div class="gantt-wrap">
        <div class="gantt-container" id="gantt-root"></div>
      </div>
    </main>
  </div>

  <!-- Color Picker Popover UI -->
  <div id="color-picker-popover">
    <div class="swatch-grid" id="popover-swatches"></div>
    <div class="popover-footer">
      <input type="text" class="popover-hex" id="popover-hex-input" spellcheck="false" placeholder="#000000" />
      <button class="native-picker-trigger" id="popover-native-btn" data-i18n-title="moreColors" title="更多颜色"></button>
      <input type="color" id="popover-native-hidden" style="display:none" />
    </div>
  </div>

  <!-- Export Modal -->
  <div id="export-modal" class="modal-overlay"
    style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:10000; align-items:center; justify-content:center;">
    <div class="modal-content"
      style="background:var(--panel); padding:24px; border-radius:12px; width:300px; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
      <h3 style="margin-top:0; color:var(--text);" data-i18n="exportTitle">导出选项</h3>
      <p style="font-size: 13px; color: var(--muted); margin-bottom: 20px;" data-i18n="exportHint">请选择您要导出的文件格式：</p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button class="btn btn-row-1 group" id="do-export-pdf"
          style="text-align:left; padding:12px; display:flex; align-items:center;">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <span class="btn-text-content" data-i18n="exportPdf" style="display:flex; align-items:center; gap:10px;">
            <img src="assets/images/pdf.svg" width="22" height="22" alt="PDF"> 导出为 PDF
          </span>
        </button>
        <button class="btn btn-row-2 group" id="do-export-xlsx"
          style="text-align:left; padding:12px; display:flex; align-items:center;">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <span class="btn-text-content" data-i18n="exportXlsx" style="display:flex; align-items:center; gap:10px;">
            <img src="assets/images/xlsx.svg" width="22" height="22" alt="XLSX"> 导出为 Excel (XLSX)
          </span>
        </button>
        <button class="btn btn-row-3 group" id="do-export-csv"
          style="text-align:left; padding:12px; display:flex; align-items:center;">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <span class="btn-text-content" data-i18n="exportCsv" style="display:flex; align-items:center; gap:10px;">
            <img src="assets/images/csv.svg" width="22" height="22" alt="CSV"> 导出为 CSV 表格
          </span>
        </button>
        <button class="btn btn-row-4 group" id="do-export-json"
          style="text-align:left; padding:12px; display:flex; align-items:center;">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <span class="btn-text-content" data-i18n="exportJson" style="display:flex; align-items:center; gap:10px;">
            <img src="assets/images/json.svg" width="22" height="22" alt="JSON"> 导出为 JSON 数据
          </span>
        </button>
      </div>
      <div class="actions-row" style="text-align: right; margin-top: 20px;">
        <button class="btn btn-collapse group" id="close-export-modal" data-i18n="cancel">
          <span class="corner-top"><span class="corner-cut"></span></span>
          <span class="corner-bottom"><span class="corner-cut"></span></span>
          <span class="btn-slide"></span>
          <span class="btn-text-content">取消</span>
        </button>
      </div>
    </div>
  </div>


  <!-- Drag and Drop Overlay -->
  <div id="drop-zone" class="drop-zone">
    <div class="drop-zone-content">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <span data-i18n="dropHint">松开鼠标，导入 Excel 文件</span>
    </div>
  </div>

  <script src="assets/js/script.js"></script>
</body>

</html>
